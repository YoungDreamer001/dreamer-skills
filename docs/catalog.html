    <style>
        /* === RESET & BASE === */

        body {

        /* === HEADER === */

        .header-content {

        .header h1 { font-size: 2.25rem; font-weight: 800; color: #111827; letter-spacing: -0.025em; line-height: 1.1; }
        .header-meta { font-size: 0.95rem; color: #6B7280; font-weight: 500; }

        /* === SEARCH === */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 380px;
            margin-bottom: 4px;
        }
        .search-input {
            width: 100%;
            padding: 10px 40px 10px 38px;
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #1F2937;
            background: #fff;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            font-family: var(--font-sans);
        }
        .search-input::placeholder { color: #9CA3AF; }
        .search-input:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background: #fff;
        }
        .search-input:hover:not(:focus) { border-color: #D1D5DB; }
        .search-icon {
            position: absolute;
            left: 12px;
            color: #9CA3AF;
            pointer-events: none;
            transition: color 0.2s;
        }
        .search-input:focus ~ .search-icon { color: #3B82F6; }
        .search-shortcut {
            position: absolute;
            right: 10px;
            display: flex;
            align-items: center;
            pointer-events: none;
        }
        .search-shortcut kbd {
            background: #F3F4F6;
            border: 1px solid #E5E7EB;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.75rem;
            color: #6B7280;
            font-family: var(--font-mono);
            font-weight: 600;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        /* HIGHLIGHTING */
        mark {
            background-color: rgba(253, 224, 71, 0.6);
            color: inherit;
            border-radius: 2px;
            padding: 0 2px;
            margin: 0 -2px;
            font-weight: 600;
            box-shadow: 0 1px 1px rgba(253, 224, 71, 0.4);
        }

        .hidden { display: none !important; }

        /* Empty state */
        .empty-state {
            display: none;
            column-span: all;
            text-align: center;
            padding: 80px 20px;
            color: #6B7280;
            animation: fadeIn 0.3s ease;
        }
        .empty-state.active { display: block; }
        .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.8; display: inline-block; animation: float 3s ease-in-out infinite; }
        .empty-title { font-size: 1.25rem; font-weight: 600; color: #374151; margin-bottom: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        @media (max-width: 640px) {
            .header { align-items: flex-start; }
            .search-container { max-width: 100%; margin-top: 12px; }
        }

        /* === MASONRY GRID === */
        .masonry-grid {
            column-count: 1;
            column-gap: 20px;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1440px) { .masonry-grid { column-count: 4; } }

        /* === SECTION (CARD) === */
        .section {
            break-inside: avoid;
            page-break-inside: avoid;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #E5E7EB;
        }

        .section-header {
            padding: 12px 16px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.025em;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .section-content {
            padding: 8px 0;
            display: flex;
            flex-direction: column;
        }

        .sub-header {
            font-weight: 700;
            font-size: 0.9rem;
            color: #4B5563;
            padding: 12px 16px 4px 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* === ROW === */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 16px;
            border-bottom: 1px solid #F3F4F6;
            gap: 12px;
        }
        .row:last-child { border-bottom: none; }
        .row:hover { background: #F9FAFB; }

        .key {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            color: #1F2937;
        }

        .key.clickable {
            flex: 0 0 auto;
            max-width: 45%;
            text-align: left;
            color: #2563EB;
            cursor: pointer;
            border: none;
            background: none;
            padding: 2px 4px;
            margin-left: -4px;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .key.clickable:hover, .key.clickable:focus {
            color: #1D4ED8;
            background: rgba(37, 99, 235, 0.1);
            outline: none;
        }

        .desc {
            flex: 1;
            font-size: 0.9rem;
            color: #4B5563;
            text-align: right;
            word-break: break-word;
            line-height: 1.4;
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 1px 6px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status-project {
            background: #DBEAFE;
            color: #1D4ED8;
        }
        .status-global {
            background: #F3E8FF;
            color: #7C3AED;
        }
        .status-disabled {
            background: #F3F4F6;
            color: #9CA3AF;
        }

        code {
            font-family: var(--font-mono); background: #1F2937; color: #F3F4F6;

        }

        .section-content > p {
            padding: 4px 16px;
            font-size: 0.9rem;
            color: #4B5563;
        }

        /* === MODAL STYLES === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(17, 24, 39, 0.75); backdrop-filter: blur(2px);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; opacity: 0; transition: opacity 0.2s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal {
            background: white; border-radius: 12px;
            max-width: 800px; width: 100%; max-height: 90vh;
            overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header {
            background: #111827; color: white; padding: 20px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.025em; }
        .modal-close {
            background: none; border: none; color: #9CA3AF; font-size: 1.75rem; cursor: pointer;
            line-height: 1; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; transition: all 0.15s;
        }
        .modal-close:hover, .modal-close:focus { color: white; background: rgba(255, 255, 255, 0.1); outline: none; }
        .modal-body {
            padding: 24px; overflow-y: auto; font-size: 1rem; line-height: 1.6; color: #374151;
        }
        .modal-body table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .modal-body th, .modal-body td { border: 1px solid #E5E7EB; padding: 12px 16px; text-align: left; }
        .modal-body th { background: #F3F4F6; font-weight: 600; color: #111827; }
        .modal-body code { background: #F3F4F6; color: #1F2937; padding: 2px 6px; border-radius: 4px; font-size: 0.9rem; font-family: var(--font-mono); }
        .modal-body pre { background: #1F2937; color: #F3F4F6; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 16px 0; }
        .modal-body pre code { background: transparent; color: inherit; padding: 0; }
        .modal-body a { color: #2563EB; text-decoration: none; font-weight: 500; }
        .modal-body a:hover { text-decoration: underline; }

        /* Modal detail layout */
        .detail-row { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
        .detail-label { font-weight: 600; color: #6B7280; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; min-width: 80px; flex-shrink: 0; margin-top: 2px; }
        .detail-value { color: #1F2937; font-size: 0.95rem; line-height: 1.5; }
        .detail-value .status-badge { font-size: 0.75rem; padding: 2px 8px; }
    </style>
</head>

# Skill Catalog（技能目录）

> 按使用场景分类的双语技能目录。技能名称、CLI 命令及文件路径保留英文。触发关键词保留英文原文并附加中文释义。
> 状态说明：✅ 项目 = 项目级启用　|　✅ 全局 = 全局启用　|　❌ = 未启用

---

## 内容创作

| 技能名称 | 状态 | 描述 | 触发关键词 |
|---|---|---|---|
| article-analyzer | ✅ 项目 | 将文章、论文、技术博客等深度分析为结构化理解文档，输出多维度分析模块与综合文档 | article analysis / 深度分析 / 论文速读 / thought refinement / 认知升级 / 底层模型 |
| merge-drafts | ✅ 项目 | 将多份草稿合并为一篇高质量文章，以最佳草稿为基底整合亮点与缺失内容 | merge drafts / 合并稿子 / 合稿 / combine drafts / 整合稿件 |
| subtext-article | ✅ 项目 | 将字幕、ASR 转写、播客转写、B站/YouTube 字幕等转换为忠实的长篇中文文章 | subtitles / transcript / B站字幕 / YouTube字幕 / 视频文稿 / 播客转写 |
| baoyu-translate | ✅ 项目 | 多语言文章翻译，支持快速/标准/精细三种模式，可加载自定义术语表 | translate / 翻译 / 精翻 / localize / 本地化 / 改成中文/英文 |
| baoyu-format-markdown | ✅ 项目 | 格式化 Markdown 文件，自动添加 frontmatter、标题、摘要、层级、加粗、列表与代码块 | format markdown / beautify article / 格式化 |
| baoyu-url-to-markdown | ✅ 项目 | 抓取任意 URL 并转换为 Markdown，内置 X/Twitter、YouTube、Hacker News 等站点适配 | save webpage as markdown / URL to markdown / 网页转 Markdown |

| ljg-read | ❌ | 伴读 Agent，提供翻译、结构注释、深度提问与跨领域洞察，引导读者理解作者原意 | 伴读 / 陪我读 / read with me / companion read |

    </script>

    <script>
        const mdText = document.getElementById('markdown-content').textContent;
        const tokens = marked.lexer(mdText);
        const mainGrid = document.getElementById('mainGrid');

        const modalDataMap = new Map();
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const modalCloseBtn = document.getElementById('modalClose');
        let previouslyFocusedElement = null;

        let currentSection = null;
        let currentSectionContent = null;
        let themeIndex = 0;

        function statusToBadge(text) {
            if (text.includes('✅ 项目')) {
                return '<span class="status-badge status-project">✅ 项目</span>';
            } else if (text.includes('✅ 全局')) {
                return '<span class="status-badge status-global">✅ 全局</span>';
            } else if (text.includes('❌')) {
                return '<span class="status-badge status-disabled">❌ 未启用</span>';
            }
            return text;
        }

        function statusClass(text) {
            if (text.includes('✅ 项目')) return 'status-project';
            if (text.includes('✅ 全局')) return 'status-global';
            if (text.includes('❌')) return 'status-disabled';
            return '';
        }

        function highlightHTML(html, query) {
            if (!query) return html;
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            const parts = html.split(/(<[^>]+>)/);
            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 0) {
                    parts[i] = parts[i].replace(regex, '<mark>$1</mark>');
                }
            }
            return parts.join('');
        }

        for (let i = 0; i < tokens.length; i++) {
            const token = tokens[i];

            if (token.type === 'heading' && token.depth === 2) {
                currentSection = document.createElement('section');
                currentSection.className = 'section';
                currentSection.style.borderTop = `4px solid var(--theme-${themeIndex % 10}-header)`;

                const header = document.createElement('div');
                header.className = 'section-header';
                header.innerHTML = marked.parseInline(token.text);
                header.dataset.originalHtml = header.innerHTML;
                header.style.backgroundColor = `var(--theme-${themeIndex % 10}-bg)`;
                header.style.color = `var(--theme-${themeIndex % 10}-header)`;

                currentSectionContent = document.createElement('div');
                currentSectionContent.className = 'section-content';

                currentSection.appendChild(header);
                currentSection.appendChild(currentSectionContent);
                mainGrid.appendChild(currentSection);

                themeIndex++;
            }
            else if (token.type === 'heading' && token.depth === 3 && currentSectionContent) {
                const subheader = document.createElement('div');
                subheader.className = 'sub-header';
                subheader.innerHTML = marked.parseInline(token.text);
                subheader.dataset.originalHtml = subheader.innerHTML;
                currentSectionContent.appendChild(subheader);
            }
            else if (token.type === 'table' && currentSectionContent) {
                token.rows.forEach((row, rowIndex) => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'row';

                    // Columns: 技能名称, 状态, 描述, 触发关键词
                    const nameCell = row[0].tokens[0] && row[0].tokens[0].type === 'strong'
                        ? row[0].tokens[0].text : row[0].text;
                    const statusText = row[1].text;
                    const descText = row[2].text;
                    const triggerText = row[3].text;

                    const btn = document.createElement('button');
                    btn.className = 'key clickable';
                    btn.innerHTML = marked.parseInline(nameCell);
                    btn.dataset.originalHtml = btn.innerHTML;

                    const descSpan = document.createElement('span');
                    descSpan.className = 'desc';
                    descSpan.innerHTML = marked.parseInline(descText);
                    descSpan.dataset.originalHtml = descSpan.innerHTML;

                    // Build modal content with custom detail layout
                    let modalContent = '';
                    modalContent += `<div class="detail-row"><div class="detail-label">技能名称</div><div class="detail-value">${marked.parseInline(nameCell)}</div></div>`;
                    modalContent += `<div class="detail-row"><div class="detail-label">状态</div><div class="detail-value">${statusToBadge(statusText)}</div></div>`;
                    modalContent += `<div class="detail-row"><div class="detail-label">描述</div><div class="detail-value">${marked.parseInline(descText)}</div></div>`;
                    modalContent += `<div class="detail-row"><div class="detail-label">触发关键词</div><div class="detail-value">${marked.parseInline(triggerText)}</div></div>`;

                    const modalId = `modal_${themeIndex}_${rowIndex}`;
                    modalDataMap.set(modalId, {
                        title: nameCell.replace(/<[^>]+>/g, ''),
                        content: modalContent
                    });

                    btn.onclick = () => openModal(modalId, btn);

                    rowDiv.appendChild(btn);
                    rowDiv.appendChild(descSpan);
                    currentSectionContent.appendChild(rowDiv);
                });
            }
            else if (currentSectionContent && token.type !== 'space' && token.type !== 'hr') {
                if (token.type === 'paragraph') {
                    const p = document.createElement('p');
                    p.innerHTML = marked.parseInline(token.text);
                    p.dataset.originalHtml = p.innerHTML;
                    currentSectionContent.appendChild(p);
                }
            }
        }

        const emptyState = document.createElement('div');
        emptyState.className = 'empty-state';
        emptyState.innerHTML = `
            <div class="empty-icon">😵‍💫</div>
            <div class="empty-title">未找到匹配的技能</div>
            <p>请尝试更换关键词，或缩短搜索词</p>
        `;
        mainGrid.appendChild(emptyState);

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            let hasVisibleCards = false;

            const sections = document.querySelectorAll('.section');

            sections.forEach(section => {
                let hasVisibleContent = false;

                const sectionHeader = section.querySelector('.section-header');
                const sectionTitle = sectionHeader.textContent.toLowerCase();
                const sectionMatches = sectionTitle.includes(query);

                sectionHeader.innerHTML = highlightHTML(sectionHeader.dataset.originalHtml, query);

                const contentItems = section.querySelectorAll('.row, p, .sub-header');

                contentItems.forEach(item => {
                    if (item.classList.contains('sub-header')) {
                        item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                        return;
                    }

                    const text = item.textContent.toLowerCase();
                    const itemMatches = text.includes(query);

                    if (sectionMatches || query === '' || itemMatches) {
                        item.classList.remove('hidden');
                        hasVisibleContent = true;

                        const highlightableChildren = item.querySelectorAll('[data-original-html]');
                        if (highlightableChildren.length > 0) {
                            highlightableChildren.forEach(child => {
                                child.innerHTML = highlightHTML(child.dataset.originalHtml, query);
                            });
                        } else if (item.dataset.originalHtml) {
                            item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                        }
                    } else {
                        item.classList.add('hidden');
                    }
                });

                let currentSubHeader = null;
                let currentSubHeaderHasVisibleRows = false;

                contentItems.forEach(item => {
                    if (item.classList.contains('sub-header')) {
                        if (currentSubHeader) {
                            currentSubHeader.classList.toggle('hidden', !currentSubHeaderHasVisibleRows);
                        }
                        currentSubHeader = item;
                        currentSubHeaderHasVisibleRows = false;
                    } else if (!item.classList.contains('hidden')) {
                        currentSubHeaderHasVisibleRows = true;
                    }
                });

                if (currentSubHeader) {
                    currentSubHeader.classList.toggle('hidden', !currentSubHeaderHasVisibleRows);
                }

                if (hasVisibleContent || sectionMatches) {
                    section.classList.remove('hidden');
                    hasVisibleCards = true;

                    if (sectionMatches && query !== '') {
                        contentItems.forEach(item => {
                            item.classList.remove('hidden');
                            const highlightableChildren = item.querySelectorAll('[data-original-html]');
                            if (highlightableChildren.length > 0) {
                                highlightableChildren.forEach(child => {
                                    child.innerHTML = highlightHTML(child.dataset.originalHtml, query);
                                });
                            } else if (item.dataset.originalHtml) {
                                item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                            }
                        });
                    }
                } else {
                    section.classList.add('hidden');
                }
            });

            emptyState.classList.toggle('active', !hasVisibleCards && query !== '');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput && !modalOverlay.classList.contains('active')) {
                e.preventDefault();
                searchInput.focus();
            } else if (e.key === 'Escape') {
                if (modalOverlay.classList.contains('active')) {
                    closeModal();
                } else if (document.activeElement === searchInput) {
                    if (searchInput.value) {
                        searchInput.value = '';
                        searchInput.dispatchEvent(new Event('input'));
                    } else {
                        searchInput.blur();
                    }
                }
            }
        });

        function openModal(id, triggerElement) {
            const data = modalDataMap.get(id);
            if (!data) return;

            previouslyFocusedElement = triggerElement;
            modalTitle.textContent = data.title;
            modalBody.innerHTML = data.content;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            setTimeout(() => modalBody.focus(), 50);
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';

            if (previouslyFocusedElement) {
                previouslyFocusedElement.focus();
            }
        }

        modalCloseBtn.onclick = closeModal;
        modalOverlay.onclick = (e) => {
            if (e.target === modalOverlay) closeModal();
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
