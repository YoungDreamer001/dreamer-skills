            position: absolute;
            left: 12px;
            color: #9CA3AF;
            pointer-events: none;
            transition: color 0.2s;
        }
        .search-input:focus ~ .search-icon { color: #3B82F6; }

            display: flex;
            align-items: center;
            pointer-events: none;

            color: #6B7280;
            font-family: var(--font-mono);
            font-weight: 600;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);

            border-radius: 2px;
            padding: 0 2px;
            margin: 0 -2px;
            font-weight: 600;
            box-shadow: 0 1px 1px rgba(253, 224, 71, 0.4);
        }

        .hidden { display: none !important; }

        /* Empty state */
        .empty-state {
            display: none;
            column-span: all;
            text-align: center;
            padding: 80px 20px;
            color: #6B7280;
            animation: fadeIn 0.3s ease;
        }
        .empty-state.active { display: block; }

## 🔗 实用工作流组合

以下是将多个技能串联使用的典型工作流。每个工作流按执行顺序排列，你可以按需裁剪步骤。

### 1. 内容创作与多平台发布流

适合将从素材收集到多平台分发的完整链路自动化。

```
素材采集 → 深度分析 → 内容创作 → 视觉包装 → 排版发布
```

| 步骤 | 推荐技能 | 作用 |
|---|---|---|
| ① 素材采集 | `baoyu-url-to-markdown` / `baoyu-youtube-transcript` | 将网页/视频转为可编辑的 Markdown |
| ② 深度分析 | `article-analyzer` | 对素材进行结构化拆解与洞察提取 |
| ③ 内容创作 | `merge-drafts` / `subtext-article` | 多素材合并成文章，或视频转写润色 |
| ④ 翻译润色 | `baoyu-translate` | 多语言翻译与术语统一 |
| ⑤ 视觉包装 | `baoyu-cover-image` / `baoyu-article-illustrator` | 生成封面图与正文配图 |
| ⑥ 排版转换 | `baoyu-markdown-to-html` | Markdown 转微信兼容 HTML |
| ⑦ 多平台发布 | `baoyu-post-to-wechat` / `baoyu-post-to-weibo` / `baoyu-post-to-x` | 一键发布至各平台 |

> 💡 如果你只有一篇原始素材想快速出稿，可以跳过 ①②，直接用 `article-analyzer` 提取要点后进入 ③。

### 2. 知识萃取与知识库归档流

适合将碎片化信息（视频、播客、文章）沉淀为结构化知识资产。

```
原始内容 → 转写/提取 → 分析重构 → 翻译整理 → 知识库归档
```

| 步骤 | 推荐技能 | 作用 |
|---|---|---|
| ① 原始内容 | `baoyu-youtube-transcript` / `baoyu-url-to-markdown` | 获取视频字幕或网页原文 |
| ② 转写重构 | `subtext-article` | 将字幕/ASR 转写转为可读文章 |
| ③ 深度分析 | `article-analyzer` | 提取核心论点、框架与可行动洞察 |
| ④ 概念寓言化 | `concept-fable` | 将复杂概念转为三段式寓言故事（可选） |
| ⑤ 翻译整理 | `baoyu-translate` | 外文内容精翻，统一术语 |
| ⑥ 知识库归档 | `ima-skill` | 上传至 IMA 知识库，建立个人/团队知识索引 |

> 💡 配合 `weread-skills` 可将微信读书笔记同步纳入知识管理体系。

### 3. 演示文稿快速制作流

适合从大纲到成品的幻灯片/网页演示制作。

```
主题定义 → 内容生成 → 图表配图 → 幻灯片制作 → 封面收尾
```

| 步骤 | 推荐技能 | 作用 |
|---|---|---|
| ① 主题定义 | `prompt-optimizer` | 将模糊需求编译为结构化 prompt |
| ② 内容生成 | `HeavySkill` / `article-analyzer` | 深度思考生成大纲与逐页内容 |
| ③ 图表配图 | `baoyu-diagram` / `baoyu-infographic` | 生成流程图、架构图或信息图 |
| ④ 幻灯片制作 | `html-ppt` / `guizang-ppt-skill` / `baoyu-slide-deck` | 生成网页 PPT 或图片版幻灯片 |
| ⑤ 封面收尾 | `baoyu-cover-image` | 生成演示封面与章节过渡页 |
| ⑥ 品牌统一 | `theme-factory` | 应用统一主题配色与排版风格 |

> 💡 若需要技术类演示，可额外使用 `architecture-diagram` 生成深色架构图。

### 4. 产品研发与发布流

适合从需求到上线的完整开发周期。

```
需求澄清 → 规格定义 → 增量开发 → 代码审查 → 质量保障 → 部署发布
```

| 步骤 | 推荐技能 | 作用 |
|---|---|---|
| ① 需求澄清 | `to-prd` / `idea-refine` | 对话生成 PRD，或压力测试假设 |
| ② 规格定义 | `spec-driven-development` | 编码前先写规范文档与接口契约 |
| ③ 增量开发 | `incremental-implementation` / `tdd` | 大任务拆分，测试驱动逐步落地 |
| ④ 代码审查 | `code-review-and-quality` | 多维度审查，合并前质量把关 |
| ⑤ 质量保障 | `setup-pre-commit` / `webapp-testing` | 配置提交钩子与自动化测试 |
| ⑥ 部署发布 | `deploy-to-vercel` / `release-skills` | 一键部署，自动检测版本与 changelog |

> 💡 如需 API 设计，可在 ② 阶段加入 `api-and-interface-design` 或 `design-an-interface`。

### 5. 社交媒体内容运营流

适合将优质外部内容改编为自有社交媒体素材。

```
热点捕捉 → 内容改编 → 视觉设计 → 一键分发
```

| 步骤 | 推荐技能 | 作用 |
|---|---|---|
| ① 热点捕捉 | `baoyu-x-to-markdown` / `baoyu-url-to-markdown` | 保存推文/文章为 Markdown |
| ② 内容改编 | `merge-drafts` / `blog-checker` | 合稿并评估文章质量 |
| ③ 视觉设计 | `guizang-social-card-skill` / `baoyu-infographic` | 生成小红书图文、信息图等 |
| ④ 一键分发 | `baoyu-post-to-x` / `baoyu-post-to-weibo` / `baoyu-post-to-wechat` | 多平台同步发布 |

> 💡 运营小红书时，`guizang-social-card-skill` 的 3:4 封面模板可直接使用。

### 6. 长文精读与复盘沉淀流

适合对高质量长文进行深度阅读并沉淀为个人方法论。

```
长文输入 → 伴读分析 → 复盘提取 → 提示词沉淀
```

| 步骤 | 推荐技能 | 作用 |
|---|---|---|
| ① 长文输入 | `baoyu-url-to-markdown` | 将长文转为本地 Markdown |
| ② 伴读分析 | `article-analyzer` / `HeavySkill` | 结构化拆解与深度思考 |
| ③ 复盘提取 | `session-achieve` | 从阅读/对话中提取纠偏逻辑与关键洞察 |
| ④ 提示词沉淀 | `prompt-optimizer` | 将个人阅读方法论固化为可复用 prompt |
| ⑤ 归档管理 | `ima-skill` | 存入知识库，建立阅读索引 |

> 💡 配合 `weread-skills` 可将微信读书中的划线与书评纳入同一复盘流程。


    </script>

    <script>
        const mdText = document.getElementById('markdown-content').textContent;
        const tokens = marked.lexer(mdText);
        const mainGrid = document.getElementById('mainGrid');

        const modalDataMap = new Map();
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const modalCloseBtn = document.getElementById('modalClose');
        let previouslyFocusedElement = null;

        let currentSection = null;
        let currentSectionContent = null;
        let themeIndex = 0;

        function statusToBadge(text) {
            if (text.includes('✅ 项目')) {
                return '<span class="status-badge status-project">✅ 项目</span>';
            } else if (text.includes('✅ 全局')) {
                return '<span class="status-badge status-global">✅ 全局</span>';
            } else if (text.includes('❌')) {
                return '<span class="status-badge status-disabled">❌ 未启用</span>';
            }
            return text;
        }

        function statusClass(text) {
            if (text.includes('✅ 项目')) return 'status-project';
            if (text.includes('✅ 全局')) return 'status-global';
            if (text.includes('❌')) return 'status-disabled';
            return '';
        }

        function highlightHTML(html, query) {
            if (!query) return html;
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            const parts = html.split(/(<[^>]+>)/);
            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 0) {
                    parts[i] = parts[i].replace(regex, '<mark>$1</mark>');
                }
            }
            return parts.join('');
        }

        for (let i = 0; i < tokens.length; i++) {
            const token = tokens[i];

            if (token.type === 'heading' && token.depth === 2) {
                currentSection = document.createElement('section');
                currentSection.className = 'section';
                currentSection.style.borderTop = `4px solid var(--theme-${themeIndex % 10}-header)`;

                const header = document.createElement('div');
                header.className = 'section-header';
                header.innerHTML = marked.parseInline(token.text);
                header.dataset.originalHtml = header.innerHTML;
                header.style.backgroundColor = `var(--theme-${themeIndex % 10}-bg)`;
                header.style.color = `var(--theme-${themeIndex % 10}-header)`;

                currentSectionContent = document.createElement('div');
                currentSectionContent.className = 'section-content';

                currentSection.appendChild(header);
                currentSection.appendChild(currentSectionContent);
                mainGrid.appendChild(currentSection);

                themeIndex++;
            }
            else if (token.type === 'heading' && token.depth === 3 && currentSectionContent) {
                const subheader = document.createElement('div');
                subheader.className = 'sub-header';
                subheader.innerHTML = marked.parseInline(token.text);
                subheader.dataset.originalHtml = subheader.innerHTML;
                currentSectionContent.appendChild(subheader);
            }
            else if (token.type === 'table' && currentSectionContent) {
                // Check if this is a skill catalog table (4+ columns)
                const isSkillTable = token.header && token.header.length >= 4;

                if (!isSkillTable) {
                    // Render as a generic styled table for workflow/other tables
                    const tableWrapper = document.createElement('div');
                    tableWrapper.style.padding = '8px 16px';
                    tableWrapper.style.overflowX = 'auto';

                    let html = '<table style="width:100%;border-collapse:collapse;font-size:0.9rem;">';
                    html += '<thead><tr>';
                    token.header.forEach(h => {
                        html += `<th style="border:1px solid #E5E7EB;padding:8px 12px;text-align:left;background:#F3F4F6;font-weight:600;">${marked.parseInline(h.text)}</th>`;
                    });
                    html += '</tr></thead><tbody>';
                    token.rows.forEach(row => {
                        html += '<tr>';
                        row.forEach(cell => {
                            html += `<td style="border:1px solid #E5E7EB;padding:8px 12px;">${marked.parseInline(cell.text)}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody></table>';

                    tableWrapper.innerHTML = html;
                    currentSectionContent.appendChild(tableWrapper);
                } else {
                token.rows.forEach((row, rowIndex) => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'row';

                    // Columns: 技能名称, 状态, 描述, 触发关键词
                    const nameCell = row[0].tokens[0] && row[0].tokens[0].type === 'strong'
                        ? row[0].tokens[0].text : row[0].text;
                    const statusText = row[1].text;
                    const descText = row[2].text;
                    const triggerText = row[3].text;

                    const btn = document.createElement('button');
                    btn.className = 'key clickable';
                    btn.innerHTML = marked.parseInline(nameCell);
                    btn.dataset.originalHtml = btn.innerHTML;

                    const descSpan = document.createElement('span');
                    descSpan.className = 'desc';
                    descSpan.innerHTML = marked.parseInline(descText);
                    descSpan.dataset.originalHtml = descSpan.innerHTML;

                    // Build modal content with custom detail layout
                    let modalContent = '';
                    modalContent += `<div class="detail-row"><div class="detail-label">技能名称</div><div class="detail-value">${marked.parseInline(nameCell)}</div></div>`;
                    modalContent += `<div class="detail-row"><div class="detail-label">状态</div><div class="detail-value">${statusToBadge(statusText)}</div></div>`;
                    modalContent += `<div class="detail-row"><div class="detail-label">描述</div><div class="detail-value">${marked.parseInline(descText)}</div></div>`;
                    modalContent += `<div class="detail-row"><div class="detail-label">触发关键词</div><div class="detail-value">${marked.parseInline(triggerText)}</div></div>`;

                    const modalId = `modal_${themeIndex}_${rowIndex}`;
                    modalDataMap.set(modalId, {
                        title: nameCell.replace(/<[^>]+>/g, ''),
                        content: modalContent
                    });

                    btn.onclick = () => openModal(modalId, btn);

                    rowDiv.appendChild(btn);
                    rowDiv.appendChild(descSpan);
                    currentSectionContent.appendChild(rowDiv);
                });
                }
            }
            else if (currentSectionContent && token.type !== 'space' && token.type !== 'hr') {
                if (token.type === 'paragraph') {
                    const p = document.createElement('p');
                    p.innerHTML = marked.parseInline(token.text);
                    p.dataset.originalHtml = p.innerHTML;
                    currentSectionContent.appendChild(p);
                }
            }
        }

        const emptyState = document.createElement('div');
        emptyState.className = 'empty-state';
        emptyState.innerHTML = `
            <div class="empty-icon">😵‍💫</div>
            <div class="empty-title">未找到匹配的技能</div>
            <p>请尝试更换关键词，或缩短搜索词</p>
        `;
        mainGrid.appendChild(emptyState);

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            let hasVisibleCards = false;

            const sections = document.querySelectorAll('.section');

            sections.forEach(section => {
                let hasVisibleContent = false;

                const sectionHeader = section.querySelector('.section-header');
                const sectionTitle = sectionHeader.textContent.toLowerCase();
                const sectionMatches = sectionTitle.includes(query);

                sectionHeader.innerHTML = highlightHTML(sectionHeader.dataset.originalHtml, query);

                const contentItems = section.querySelectorAll('.row, p, .sub-header');

                contentItems.forEach(item => {
                    if (item.classList.contains('sub-header')) {
                        item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                        return;
                    }

                    const text = item.textContent.toLowerCase();
                    const itemMatches = text.includes(query);

                    if (sectionMatches || query === '' || itemMatches) {
                        item.classList.remove('hidden');
                        hasVisibleContent = true;

                        const highlightableChildren = item.querySelectorAll('[data-original-html]');
                        if (highlightableChildren.length > 0) {
                            highlightableChildren.forEach(child => {
                                child.innerHTML = highlightHTML(child.dataset.originalHtml, query);
                            });
                        } else if (item.dataset.originalHtml) {
                            item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                        }
                    } else {
                        item.classList.add('hidden');
                    }
                });

                let currentSubHeader = null;
                let currentSubHeaderHasVisibleRows = false;

                contentItems.forEach(item => {
                    if (item.classList.contains('sub-header')) {
                        if (currentSubHeader) {
                            currentSubHeader.classList.toggle('hidden', !currentSubHeaderHasVisibleRows);
                        }
                        currentSubHeader = item;
                        currentSubHeaderHasVisibleRows = false;
                    } else if (!item.classList.contains('hidden')) {
                        currentSubHeaderHasVisibleRows = true;
                    }
                });

                if (currentSubHeader) {
                    currentSubHeader.classList.toggle('hidden', !currentSubHeaderHasVisibleRows);
                }

                if (hasVisibleContent || sectionMatches) {
                    section.classList.remove('hidden');
                    hasVisibleCards = true;

                    if (sectionMatches && query !== '') {
                        contentItems.forEach(item => {
                            item.classList.remove('hidden');
                            const highlightableChildren = item.querySelectorAll('[data-original-html]');
                            if (highlightableChildren.length > 0) {
                                highlightableChildren.forEach(child => {
                                    child.innerHTML = highlightHTML(child.dataset.originalHtml, query);
                                });
                            } else if (item.dataset.originalHtml) {
                                item.innerHTML = highlightHTML(item.dataset.originalHtml, query);
                            }
                        });
                    }
                } else {
                    section.classList.add('hidden');
                }
            });

            emptyState.classList.toggle('active', !hasVisibleCards && query !== '');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput && !modalOverlay.classList.contains('active')) {
                e.preventDefault();
                searchInput.focus();
            } else if (e.key === 'Escape') {
                if (modalOverlay.classList.contains('active')) {
                    closeModal();
                } else if (document.activeElement === searchInput) {
                    if (searchInput.value) {
                        searchInput.value = '';
                        searchInput.dispatchEvent(new Event('input'));
                    } else {
                        searchInput.blur();
                    }
                }
            }
        });

        function openModal(id, triggerElement) {
            const data = modalDataMap.get(id);
            if (!data) return;

            previouslyFocusedElement = triggerElement;
            modalTitle.textContent = data.title;
            modalBody.innerHTML = data.content;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            setTimeout(() => modalBody.focus(), 50);
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';

            if (previouslyFocusedElement) {
                previouslyFocusedElement.focus();
            }
        }

        modalCloseBtn.onclick = closeModal;
        modalOverlay.onclick = (e) => {
            if (e.target === modalOverlay) closeModal();
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
